      <stop offset="0%" stop-color="#E8DDD0" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#F5F0E8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="wash2" cx="90%" cy="20%" r="30%">
      <stop offset="0%" stop-color="#DED3C4" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#F5F0E8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="wash3" cx="80%" cy="85%" r="35%">
      <stop offset="0%" stop-color="#E0D5C8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#F5F0E8" stop-opacity="0"/>
