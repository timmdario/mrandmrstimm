<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <!-- Paper texture -->
    <filter id="paper1">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
      <feBlend in="SourceGraphic" in2="gray" mode="multiply" result="blend"/>
      <feComponentTransfer in="blend">
        <feFuncA type="linear" slope="0.03"/>
      </feComponentTransfer>
    </filter>
    <!-- Shadow filter -->
    <filter id="shadow1" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#5A4030" flood-opacity="0.25"/>
    </filter>
    <!-- Inner shadow for depth -->
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#CCA87A"/>
      <stop offset="25%" stop-color="#C4A484"/>
      <stop offset="55%" stop-color="#A8845F"/>
      <stop offset="80%" stop-color="#9A7B5B"/>
      <stop offset="100%" stop-color="#8A6B4B"/>
    </linearGradient>
    <linearGradient id="flapGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#B89B7A"/>
      <stop offset="40%" stop-color="#A88A6A"/>
      <stop offset="100%" stop-color="#8A6B4B"/>
    </linearGradient>
    <linearGradient id="frontGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#CCA87A"/>
      <stop offset="30%" stop-color="#C4A484"/>
      <stop offset="70%" stop-color="#A8845F"/>
      <stop offset="100%" stop-color="#8A6B4B"/>
    </linearGradient>
    <radialGradient id="sealGrad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#D4725F"/>
      <stop offset="20%" stop-color="#C45C4A"/>
      <stop offset="50%" stop-color="#A04030"/>
      <stop offset="75%" stop-color="#7A2E20"/>
      <stop offset="100%" stop-color="#5A1E10"/>
    </radialGradient>
  </defs>

  <!-- ENVELOPE BACK (main body) -->
  <g filter="url(#shadow1)">
    <rect x="10" y="40" width="380" height="250" rx="6" fill="url(#bodyGrad)"/>
    <!-- Paper grain -->
    <rect x="10" y="40" width="380" height="250" rx="6" fill="url(#bodyGrad)" opacity="0.9"/>
    <!-- Inner border / stitching -->
    <rect x="16" y="46" width="368" height="238" rx="3" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.8" stroke-dasharray="4,4"/>
    <!-- Top edge highlight -->
    <line x1="16" y1="41" x2="394" y2="41" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  </g>

  <!-- LEFT FLAP (folded in) -->
  <path d="M10 40 L160 115 L10 200 Z" fill="#B89B7A" stroke="rgba(0,0,0,0.05)" stroke-width="0.5"/>
  <path d="M10 40 L160 115 L10 200 Z" fill="rgba(255,255,255,0.04)"/>
  <!-- Left flap inner line -->
  <line x1="15" y1="55" x2="145" y2="115" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>

  <!-- RIGHT FLAP (folded in) -->
  <path d="M390 40 L240 115 L390 200 Z" fill="#B89B7A" stroke="rgba(0,0,0,0.05)" stroke-width="0.5"/>
  <path d="M390 40 L240 115 L390 200 Z" fill="rgba(255,255,255,0.04)"/>
  <!-- Right flap inner line -->
  <line x1="385" y1="55" x2="255" y2="115" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>

  <!-- TOP FLAP (closed, triangle pointing down) -->
  <path d="M10 40 L200 175 L390 40 Z" fill="url(#flapGrad)"/>
  <path d="M10 40 L200 175 L390 40 Z" fill="rgba(255,255,255,0.05)"/>
  <!-- Flap edge highlight -->
  <line x1="15" y1="43" x2="195" y2="170" stroke="rgba(255,255,255,0.08)" stroke-width="0.7"/>
  <line x1="385" y1="43" x2="205" y2="170" stroke="rgba(0,0,0,0.04)" stroke-width="0.7"/>
  <!-- Flap fold line -->
  <line x1="12" y1="41" x2="388" y2="41" stroke="rgba(0,0,0,0.08)" stroke-width="1"/>

  <!-- ENVELOPE FRONT (bottom pocket) -->
  <path d="M10 170 L200 95 L390 170 L390 290 Q390 296 384 296 L16 296 Q10 296 10 290 Z" fill="url(#frontGrad)"/>
  <path d="M10 170 L200 95 L390 170 L390 290 Q390 296 384 296 L16 296 Q10 296 10 290 Z" fill="rgba(255,255,255,0.03)"/>
  <!-- Front pocket top edge -->
  <path d="M12 170 L200 97 L388 170" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <!-- Front pocket inner shadow -->
  <path d="M14 172 L200 100 L386 172" fill="none" stroke="rgba(0,0,0,0.06)" stroke-width="0.5"/>
  <!-- Bottom edge -->
  <line x1="12" y1="294" x2="388" y2="294" stroke="rgba(0,0,0,0.08)" stroke-width="0.5"/>

  <!-- Decorative corner ornaments on front -->
  <path d="M25 280 Q25 270 35 270" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="0.8"/>
  <path d="M375 280 Q375 270 365 270" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="0.8"/>

  <!-- WAX SEAL -->
  <circle cx="200" cy="195" r="30" fill="url(#sealGrad)" stroke="rgba(90,30,16,0.3)" stroke-width="0.5"/>
  <!-- Seal outer ring -->
  <circle cx="200" cy="195" r="26" fill="none" stroke="rgba(255,200,180,0.2)" stroke-width="1.5"/>
  <!-- Seal inner ring -->
  <circle cx="200" cy="195" r="21" fill="none" stroke="rgba(255,200,180,0.12)" stroke-width="0.8"/>
  <!-- Seal highlight -->
  <circle cx="194" cy="189" r="10" fill="rgba(255,220,200,0.08)"/>
  <!-- Seal text -->
  <text x="200" y="193" text-anchor="middle" font-family="Georgia, serif" font-size="12" font-weight="700" fill="rgba(255,215,195,0.85)" letter-spacing="1">M<tspan font-style="italic" font-size="10">&amp;</tspan>D</text>
  <!-- Seal shadow on envelope -->
  <ellipse cx="202" cy="222" rx="28" ry="5" fill="rgba(90,30,16,0.12)"/>
</svg>
